name: Unit & Integration Tests

on:
  push:
    branches: [ main, new-feature, bugfix ]
  pull_request:
    branches: [ main, new-feature, bugfix ]

jobs:
  test-unit-integration:
    timeout-minutes: 30
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'

      - name: Install Server Dependencies
        run: cd server && npm ci

      - name: Generate Prisma Client
        run: cd server && npm run prisma:generate

      - name: Push Database Schema
        run: cd server && npm run test:prepare
        env:
          DATABASE_URL: "file:./test.db"

      - name: Run Server Tests
        run: cd server && npm test
        env:
          DATABASE_URL: "file:./test.db"

      - name: Start Server
        run: |
          cd server
          npm run dev &
          npx wait-on http://localhost:5001/api/health
        env:
          PORT: 5001
          DATABASE_URL: "file:./test.db"

      - name: Install Client Dependencies
        run: cd client && npm ci

      - name: Run Client Tests
        run: cd client && npm test

  e2e-tests:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    needs: test-unit-integration

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'

      - name: Install Server Dependencies
        run: cd server && npm ci

      - name: Generate Prisma Client
        run: cd server && npm run prisma:generate

      - name: Push Database Schema
        run: cd server && npm run test:prepare
        env:
          DATABASE_URL: "file:./test.db"

      - name: Seed Database
        run: cd server && npx prisma db seed
        env:
          DATABASE_URL: "file:./test.db"

      - name: Install Client Dependencies & Build
        run: cd client && npm ci && npm run build

      - name: Install Playwright Browsers
        run: cd client && npx playwright install --with-deps

      - name: Run E2E Tests
        run: npm run test:e2e